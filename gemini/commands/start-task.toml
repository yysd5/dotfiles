疑問点があればユーザに問う。
特に無ければ疑問点は無しとして次のステップへ進む。

### ステップ3: 作業を行う

適宜ユーザとコミュニケーションしながら作業を行う。
適するスキルやサブエージェントがあれば使用する。

### ステップ4: ユーザに完了確認依頼する

作業結果についてユーザに完了を確認依頼する。
問題が有れば、ステップ3に戻り再度必要な作業を行う。
完了確認が得られれば、次のステップへ進む。

### ステップ5: 作業レポートを作成する。

task-reporterスキルを起動し、作業結果をレポートする。
